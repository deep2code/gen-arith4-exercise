name: Build and Release

on:
  push:
    branches: [ main, master ]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: [ main, master ]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:
    inputs:
      create_release:
        description: "创建 Release"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            goos: linux
            goarch: amd64
            artifact_name: gen-arith4-exercise-linux-amd64
          - os: ubuntu-latest
            arch: arm64
            goos: linux
            goarch: arm64
            artifact_name: gen-arith4-exercise-linux-arm64
          - os: macos-latest
            arch: amd64
            goos: darwin
            goarch: amd64
            artifact_name: gen-arith4-exercise-darwin-amd64
          - os: macos-latest
            arch: arm64
            goos: darwin
            goarch: arm64
            artifact_name: gen-arith4-exercise-darwin-arm64
          - os: windows-latest
            arch: amd64
            goos: windows
            goarch: amd64
            artifact_name: gen-arith4-exercise-windows-amd64.exe
          - os: windows-latest
            arch: arm64
            goos: windows
            goarch: arm64
            artifact_name: gen-arith4-exercise-windows-arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify dependencies
        run: |
          go mod verify
          go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -v -o "${{ matrix.artifact_name }}" -ldflags="-s -w -extldflags
          '-static'" -trimpath main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master')) || (github.event_name ==
      'workflow_dispatch' && inputs.create_release == true)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" -10 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 自动构建发布

            ### 更新内容
            ${{ steps.changelog.outputs.changelog }}

            ### 包含的平台
            - Linux (amd64, arm64)
            - macOS (amd64, arm64)
            - Windows (amd64, arm64)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
